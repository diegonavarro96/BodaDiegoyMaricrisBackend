# /etc/nginx/sites-available/wedding
# Serves the React build from /var/www/wedding-site and proxies /api/ to the
# Go RSVP service on 127.0.0.1:8080. Run `certbot --nginx -d your-domain`
# to fill in the HTTPS block.

server {
    listen 80;
    listen [::]:80;
    server_name your-wedding-domain.com www.your-wedding-domain.com;

    # certbot puts its challenge files here
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # everything else → https
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name your-wedding-domain.com www.your-wedding-domain.com;

    # filled in by certbot --nginx
    # ssl_certificate     /etc/letsencrypt/live/your-wedding-domain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/your-wedding-domain.com/privkey.pem;

    root /var/www/wedding-site;
    index index.html;

    # security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               application/xml+rss application/atom+xml image/svg+xml;

    client_max_body_size 256k;

    # API proxy
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Hashed assets — immutable, long cache
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # Static images / icons in /public — cache moderately
    location ~* \.(?:jpe?g|png|webp|svg|ico|woff2?)$ {
        try_files $uri =404;
        expires 30d;
        access_log off;
        add_header Cache-Control "public";
    }

    # SPA fallback (single page app — all routes serve index.html)
    location / {
        try_files $uri $uri/ /index.html;
        # index.html itself should not be cached so deploys land instantly
        add_header Cache-Control "no-cache";
    }
}
